[progression]
	#Base XP needed at level 1.
	# Default: 100
	# Range: > 1
	baseXpPerLevel = 100
	#Linear XP scaling term applied each level.
	# Default: 20
	# Range: > 0
	linearXpPerLevel = 20
	#Exponent applied to level growth (>= 1.0 recommended).
	# Default: 1.35
	# Range: 1.0 ~ 5.0
	exponent = 1.35
	#Global multiplier applied to level XP costs. Default 0.75 lowers scaling by 25%.
	# Default: 0.75
	# Range: 0.01 ~ 100.0
	levelMultiplier = 0.75
	#Hard level cap for this framework.
	# Default: 500
	# Range: > 1
	maxLevel = 500

[sources]
	#Base LevelUP XP dropped when an eligible mob is killed by a player.
	# Default: 8
	# Range: > 0
	mobKillXp = 8
	#When true, only mobs with the `drops_levels` entity tag or whose entity type is in #levelup:drops_levels drop LevelUP XP.
	#When false, all hostile mobs drop LevelUP XP.
	drop_levels_only_from_mobs_with_tag = false
